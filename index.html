<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>우리 동네</title>
<style>
  :root{
    --sky:#BFE3F5; --cream:#FFF7EA; --peach:#FFB0A0; --grape:#7A6BA6;
    --mint:#A6E0C6; --ink:#3B3348; --ink-soft:#7C7489; --line:#3B3348;
    --shadow:0 3px 0 var(--line);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:#EAF4FA;}
  #app{
    font-family:"Apple SD Gothic Neo","Pretendard","Malgun Gothic","Noto Sans KR",system-ui,sans-serif;
    color:var(--ink); font-size:15px; line-height:1.5; max-width:880px; margin:0 auto; padding:4px;
  }
  button{font:inherit; color:inherit; cursor:pointer;}
  input,textarea{font:inherit; color:inherit;}
  .card{background:var(--cream); border:2.5px solid var(--line); border-radius:18px; box-shadow:var(--shadow);}
  .btn{
    background:var(--cream); border:2.5px solid var(--line); border-radius:999px; padding:7px 14px;
    font-weight:700; box-shadow:0 2.5px 0 var(--line); transition:transform .06s, box-shadow .06s;
  }
  .btn:hover{transform:translateY(1px); box-shadow:0 1.5px 0 var(--line);}
  .btn:active{transform:translateY(2.5px); box-shadow:none;}
  .btn.primary{background:var(--peach);}
  .btn.go{background:var(--mint);}
  .btn.sm{padding:4px 10px; font-size:13px; box-shadow:0 2px 0 var(--line);}
  .btn:focus-visible{outline:3px solid var(--grape); outline-offset:2px;}
  .btn[disabled]{opacity:.45; cursor:default;}
  .spacer{flex:1}

  header{display:flex; align-items:center; gap:10px; padding:10px 6px 14px;}
  .logo{font-size:22px; font-weight:900; letter-spacing:-.04em; display:flex; align-items:center; gap:7px;}
  .logo b{background:var(--peach); border:2.5px solid var(--line); border-radius:10px; padding:1px 7px; box-shadow:0 2.5px 0 var(--line); font-size:18px;}
  .me{font-size:13px; font-weight:700; color:var(--ink-soft);}

  .center{padding:30px 22px; text-align:center;}
  .center h1{font-size:26px; letter-spacing:-.04em; margin-bottom:6px;}
  .center p{color:var(--ink-soft); font-size:14px; margin-bottom:18px;}
  .field{display:flex; gap:8px; justify-content:center; flex-wrap:wrap;}
  .field input{border:2.5px solid var(--line); border-radius:999px; padding:8px 14px; background:#fff; width:190px; outline:none;}
  .field input:focus{box-shadow:0 0 0 3px var(--sky);}

  .town-head{display:flex; align-items:baseline; gap:8px; padding:0 6px 10px;}
  .town-head h2{font-size:19px; letter-spacing:-.03em;}
  .town-head span{font-size:13px; color:var(--ink-soft); font-weight:700;}
  .village{
    position:relative; border:2.5px solid var(--line); border-radius:18px; box-shadow:var(--shadow);
    overflow:hidden; padding:52px 14px 26px; min-height:280px;
  }
  .village .deco{position:absolute; font-style:normal; pointer-events:none; z-index:1;}
  .village .veil{position:absolute; inset:0; background:#1E1A46; opacity:.34; pointer-events:none; z-index:3;}
  .houses{
    position:relative; z-index:2; display:flex; flex-wrap:wrap; align-items:flex-end;
    justify-content:center; gap:26px 20px;
  }
  .hs{
    background:none; border:0; padding:0; width:104px; position:relative;
    transition:transform .1s; display:block;
  }
  .hs:nth-child(even){margin-top:34px;}
  .hs:hover{transform:translateY(-5px);}
  .hs:focus-visible{outline:3px solid var(--grape); outline-offset:4px; border-radius:10px;}
  .hs svg{display:block; width:100%; height:auto; filter:drop-shadow(0 3px 0 rgba(59,51,72,.25));}
  .hs .plate{
    margin-top:5px; background:var(--cream); border:2.5px solid var(--line); border-radius:10px;
    padding:3px 6px; font-size:12px; font-weight:800; line-height:1.25; box-shadow:0 2px 0 var(--line);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .hs .plate small{display:block; font-size:10px; color:var(--ink-soft); font-weight:700;}
  .hs .say{
    position:absolute; left:50%; bottom:calc(100% - 6px); transform:translateX(-50%);
    background:var(--cream); border:2.5px solid var(--line); border-radius:12px; padding:3px 8px;
    font-size:11px; font-weight:800; line-height:1.3; box-shadow:0 2px 0 var(--line);
    width:max-content; max-width:130px; z-index:4;
  }
  .hs .say:before, .hs .say:after{content:''; position:absolute; bottom:-9px; left:50%; margin-left:-6px; border:6px solid transparent; border-top-color:var(--line); border-bottom:0;}
  .hs .say:after{bottom:-5px; border-top-color:var(--cream);}
  .empty{text-align:center; padding:34px 20px; color:var(--ink-soft); font-weight:700; font-size:14px;}

  .roombar{display:flex; align-items:center; gap:8px; padding:0 4px 8px; flex-wrap:wrap;}
  .roombar h2{font-size:18px; letter-spacing:-.03em;}
  .roombar h2 small{display:block; font-size:11px; color:var(--ink-soft); font-weight:700;}
  .places{display:flex; gap:6px; justify-content:center; margin-bottom:8px;}
  .place{border:2.5px solid var(--line); border-radius:999px; padding:4px 13px; font-size:13px; font-weight:800; background:var(--cream); box-shadow:0 2px 0 var(--line);}
  .place.on{background:var(--sky);}

  .stage{
    position:relative; width:100%; max-width:420px; margin:0 auto; aspect-ratio:1/1;
    border:2.5px solid var(--line); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow); touch-action:none; user-select:none;
  }
  .bg1{position:absolute; left:0; right:0; top:0;}
  .bg2{position:absolute; left:0; right:0; bottom:0; border-top:2.5px solid rgba(59,51,72,.3);}
  .shelf{position:absolute; left:0; right:0; height:5px; z-index:5;}
  .nightveil{position:absolute; inset:0; background:#1E1A46; opacity:.42; pointer-events:none; z-index:60;}
  .win{
    position:absolute; left:7%; top:7%; width:36%; height:32%; z-index:2;
    border:3px solid var(--line); border-radius:8px; overflow:hidden; background:#BFE9FF;
    box-shadow:0 2px 0 rgba(59,51,72,.3);
  }
  .win .bar{position:absolute; background:var(--line); z-index:4;}
  .win .barv{left:50%; top:0; bottom:0; width:3px; margin-left:-1.5px;}
  .win .barh{top:50%; left:0; right:0; height:3px; margin-top:-1.5px;}
  .win i{position:absolute; font-style:normal; line-height:1;}
  .win .sill{position:absolute; left:-4%; right:-4%; bottom:-7px; height:7px; background:var(--line); border-radius:2px; z-index:5;}
  .bub{
    position:absolute; right:5%; top:6%; z-index:80; max-width:56%;
    background:var(--cream); border:2.5px solid var(--line); border-radius:14px;
    padding:5px 10px; font-size:12px; font-weight:800; line-height:1.35;
    box-shadow:0 2px 0 var(--line); word-break:break-word;
  }
  .bub:before, .bub:after{content:''; position:absolute; bottom:-9px; left:16px; border:6px solid transparent; border-top-color:var(--line); border-bottom:0;}
  .bub:after{bottom:-5px; border-top-color:var(--cream);}
  .chips{display:flex; gap:5px; flex-wrap:wrap;}
  .chip{border:2px dashed var(--line); border-radius:999px; padding:2px 9px; font-size:12px; font-weight:800; background:transparent;}
  .chip:hover{background:var(--sky); border-style:solid;}
  .it{position:absolute; transform-origin:50% 100%; font-size:38px; line-height:1; cursor:grab; filter:drop-shadow(0 2px 0 rgba(59,51,72,.18));}
  .stage.view .it{cursor:default;}
  .it.sel{outline:2.5px dashed var(--grape); outline-offset:4px; border-radius:6px;}
  .hint{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:70;
    background:rgba(255,247,234,.92); border:2.5px dashed var(--line); border-radius:14px;
    padding:10px 16px; font-weight:800; font-size:13px; color:var(--ink-soft); text-align:center; pointer-events:none;
  }

  .tools{display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:8px; padding:8px 10px;}
  .tools .lab{font-size:12px; font-weight:800; color:var(--ink-soft); margin-right:2px;}
  .tools input.title{border:2.5px solid var(--line); border-radius:999px; padding:4px 12px; background:#fff; outline:none; flex:1; min-width:140px; font-size:13px; font-weight:700;}
  .tools input.title:focus{box-shadow:0 0 0 3px var(--sky);}
  .sw{width:24px; height:24px; border-radius:50%; border:2.5px solid var(--line); padding:0; box-shadow:0 2px 0 var(--line);}
  .sw.on{outline:2.5px solid var(--grape); outline-offset:2px;}
  .tabs{display:flex; gap:6px; margin:10px 0 8px; flex-wrap:wrap;}
  .tab{border:2.5px solid var(--line); border-radius:999px; padding:3px 11px; font-size:13px; font-weight:800; background:var(--cream);}
  .tab.on{background:var(--sky);}
  .palette{display:grid; grid-template-columns:repeat(auto-fill,minmax(44px,1fr)); gap:6px; padding:10px; max-height:160px; overflow:auto;}
  .palette button{aspect-ratio:1; font-size:23px; border:2px solid transparent; border-radius:12px; background:transparent;}
  .palette button:hover{background:var(--sky); border-color:var(--line);}

  .gb{margin-top:14px; padding:14px;}
  .gb h3{font-size:16px; letter-spacing:-.03em; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .gb h3 em{font-style:normal; font-size:12px; color:var(--ink-soft); font-weight:700;}
  .gb textarea{width:100%; border:2.5px solid var(--line); border-radius:14px; padding:9px 12px; background:#fff; resize:vertical; min-height:60px; outline:none;}
  .gb textarea:focus{box-shadow:0 0 0 3px var(--sky);}
  .gbrow{display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:7px;}
  .gbrow small{color:var(--ink-soft); font-weight:700; font-size:12px; margin-right:auto;}
  .notes{margin-top:14px; display:flex; flex-direction:column; gap:9px;}
  .note{border:2.5px solid var(--line); border-radius:14px; padding:9px 12px; background:#fff; position:relative;}
  .note b{font-size:13px;}
  .note time{font-size:11px; color:var(--ink-soft); font-weight:700; margin-left:6px;}
  .note p{margin-top:3px; font-size:14px; white-space:pre-wrap; word-break:break-word;}
  .note .del{position:absolute; right:8px; top:7px; background:none; border:none; font-size:12px; color:var(--ink-soft); font-weight:800;}
  .toast{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:var(--ink); color:var(--cream);
    font-weight:800; font-size:13px; padding:9px 16px; border-radius:999px; z-index:99; pointer-events:none;
    opacity:0; transition:opacity .18s;
  }
  .toast.on{opacity:1;}
  .foot{text-align:center; font-size:11px; color:var(--ink-soft); font-weight:700; padding:18px 10px 8px;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>

  if(!e) return '알 수 없는 오류';

}

/* ---------- window scenes ---------- */
const SCENES = {

const sceneHTML = (key, night)=>{
  const s = (SCENES[key]||SCENES.city)[night?'night':'day'];
  return `<div style="position:absolute;inset:0;background:${s.bg}"></div>` +
    s.bits.map(([e,x,y,f])=>`<i style="left:${x}%;top:${y}%;font-size:${f}px;transform:translate(-50%,-100%)">${e}</i>`).join('') +

/* ---------- state ---------- */
let me = null;
let state = {page:'town', roomId:null, room:null, gb:[], place:'room', edit:false, sel:null, cat:0, dirty:false};

function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),1600); }
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const when = ts => { const d=new Date(ts), m=Math.floor((Date.now()-ts)/60000);
  if(m<1) return '방금'; if(m<60) return m+'분 전'; if(m<1440) return Math.floor(m/60)+'시간 전';
  if(m<10080) return Math.floor(m/1440)+'일 전'; return `${d.getMonth()+1}월 ${d.getDate()}일`; };

/* ---------- Firebase data ---------- */
async function loadRoom(id){
  const snap = await get(ref(db, 'rooms/'+id));
  return snap.exists() ? snap.val() : null;
}
async function saveRoom(id, room){
  if(id !== auth.currentUser?.uid) throw new Error('forbidden');
  await set(ref(db, 'rooms/'+id), room);
  return true;
}
async function listRoomIds(){
  const snap = await get(ref(db, 'rooms'));
  if(!snap.exists()) return [];
  return Object.keys(snap.val());
}
async function loadGuestbook(roomId){
  const snap = await get(ref(db, 'guestbooks/'+roomId));
  if(!snap.exists()) return [];
  return Object.entries(snap.val())
    .map(([id, n])=>({ ...n, _id:id }))
    .sort((a,b)=>(b.at||0)-(a.at||0))
    .slice(0,100);
}
async function addGuestbookNote(roomId, note){
  const noteRef = push(ref(db, 'guestbooks/'+roomId));
  await set(noteRef, note);
  return noteRef.key;
}
async function deleteGuestbookNote(roomId, noteId){
  await remove(ref(db, 'guestbooks/'+roomId+'/'+noteId));
}

function blankRoom(id, nickname){
  return {id, nickname, title:nickname+'네 집', status:'', statusAt:0, scene:'city', night:false, updated:Date.now(),
    spaces:{ room:{bg1:WALLS[0], bg2:FLOORS[0], items:[]},
             fridge:{bg1:FRIDGE[0], bg2:SHELF[0], items:[]},
             yard:{bg1:SKY[0], bg2:GRASS[0], items:[]} }};
}
function normalize(r){
  if(!r.spaces){
    r.spaces = { room:{bg1:r.wall||WALLS[0], bg2:r.floor||FLOORS[0], items:r.items||[]},
                 fridge:{bg1:FRIDGE[0], bg2:SHELF[0], items:[]},
                 yard:{bg1:SKY[0], bg2:GRASS[0], items:[]} };
    delete r.wall; delete r.floor; delete r.items;
  }
  ORDER.forEach(k=>{
    if(!r.spaces[k]) r.spaces[k] = {bg1:SPACES[k].p1[0], bg2:SPACES[k].p2[0], items:[]};
    if(!Array.isArray(r.spaces[k].items)){
      const raw = r.spaces[k].items;
      r.spaces[k].items = raw && typeof raw === 'object' ? Object.values(raw) : [];
    }
  });
  r.title = r.title || (r.nickname+'네 집');
  r.status = r.status || '';
  r.statusAt = r.statusAt || 0;
  if(r.status && Date.now()-r.statusAt > DAY){ r.status=''; r.statusAt=0; }
  r.scene = r.scene || 'city';
  r.night = !!r.night;
  return r;
}

function drawStage(){
  const cfg = SPACES[state.place], sp = state.room.spaces[state.place];
  const mine = state.roomId===me.id;
  let bg = '';
  if(cfg.shelves){
    bg = `<div class="bg1" style="bottom:0;background:${sp.bg1}"></div>` +
      cfg.shelves.map(y=>`<div class="shelf" style="top:${y}%;background:${sp.bg2};box-shadow:0 2px 0 rgba(59,51,72,.3)"></div>`).join('') +
      `<div style="position:absolute;inset:0;border:10px solid rgba(255,255,255,.55);border-radius:10px;pointer-events:none;z-index:6"></div>`;
  }else{
    bg = `<div class="bg1" style="height:${cfg.split}%;background:${sp.bg1}"></div>
          <div class="bg2" style="height:${100-cfg.split}%;background:${sp.bg2}"></div>`;
    if(cfg.window) bg += `<div class="win">${sceneHTML(state.room.scene, state.room.night)}<div class="sill"></div></div>`;
  }
  $('#stagebox').innerHTML = `<div class="stage ${state.edit?'':'view'}" id="stage">${bg}
    ${state.room.night?'<div class="nightveil"></div>':''}
    ${state.room.status?`<div class="bub" id="bub">${esc(state.room.status)}</div>`:''}</div>`;
  drawItems();
  if(!state.edit && !sp.items.length){
    $('#stage').insertAdjacentHTML('beforeend',
      `<div class="hint">${mine?`아직 빈 ${cfg.n}이에요.<br>꾸미기를 눌러 보세요.`:`아직 꾸미는 중인 ${cfg.n}이에요.`}</div>`);
  }
}

function drawItems(){
  const stage = $('#stage'); if(!stage) return;
  stage.querySelectorAll('.it').forEach(n=>n.remove());
  state.room.spaces[state.place].items.forEach((it,idx)=>{
    const el = document.createElement('div');
    el.className = 'it' + (state.sel===idx?' sel':'');
    el.textContent = it.e;
    el.style.left = it.x+'%'; el.style.top = it.y+'%';
    el.style.transform = `translate(-50%,-100%) scale(${it.s||1}) scaleX(${it.f?-1:1})`;
    el.style.zIndex = 10 + Math.round(it.y);
    if(state.edit) grab(el, idx);
    stage.appendChild(el);
  });
}

function grab(el, idx){
  el.onpointerdown = e => {
    e.preventDefault();
    state.sel = idx; renderEditor(); drawItems();
    const node = $('#stage').querySelectorAll('.it')[idx];
    const r = $('#stage').getBoundingClientRect();
    const it = state.room.spaces[state.place].items[idx];
    const ox = e.clientX - (r.left + r.width*it.x/100);
    const oy = e.clientY - (r.top + r.height*it.y/100);
    node.setPointerCapture(e.pointerId); node.style.cursor='grabbing';
    node.onpointermove = ev => {
      it.x = Math.min(98, Math.max(2, (ev.clientX-ox-r.left)/r.width*100));
      it.y = Math.min(100, Math.max(8, (ev.clientY-oy-r.top)/r.height*100));
      node.style.left = it.x+'%'; node.style.top = it.y+'%'; node.style.zIndex = 10+Math.round(it.y);
      state.dirty = true;
    };
    node.onpointerup = node.onpointercancel = ()=>{ node.onpointermove=null; node.style.cursor='grab'; };
  };
}

    if(a==='small') it.s = Math.max(0.5,(it.s||1)-0.2);
    if(a==='flip') it.f = it.f?0:1;
    if(a==='front'){ items.splice(i,1); items.push(it); state.sel = items.length-1; }
    if(a==='del'){ items.splice(i,1); state.sel=null; }
    state.dirty=true; drawItems(); renderEditor();
  });
}

function leave(next){
  if(state.dirty && confirm('저장하지 않은 꾸미기가 있어요. 저장할까요?')) save(false).then(next);
  else { state.dirty=false; next(); }
}
async function save(loud){
  if(state.roomId !== me.id) return toast('남의 집은 저장할 수 없어요.');
  state.room.updated = Date.now();
  state.room.nickname = me.nickname;
  state.room.title = (state.room.title||'').trim() || (me.nickname+'네 집');
  try{
    await saveRoom(state.roomId, state.room);
    state.dirty = false;
    if(loud) toast('집을 저장했어요.');
  }catch(e){
    console.error(e);
    toast('저장이 안 됐어요. 다시 눌러 주세요.');
  }
}

async function surf(){
  try{
    const ids = (await listRoomIds()).filter(id => id !== state.roomId);
    if(!ids.length) return toast('아직 다른 집이 없어요.');
    state.page='room'; state.roomId = ids[Math.floor(Math.random()*ids.length)];
    state.edit=false; state.sel=null; state.place='room'; state.cat=0;
    render();
  }catch(e){ toast('파도가 잔잔하네요. 다시 해 볼래요?'); }
}

/* ---------- guestbook ---------- */
function renderNotes(){
  const box = $('#notes');
  if(!state.gb.length){ box.innerHTML = `<div class="empty">아직 아무도 안 다녀갔어요. 첫 번째로 남겨 보세요.</div>`; return; }
  box.innerHTML = state.gb.map(n=>`
    <div class="note">
      <b>${esc(n.name)}</b><time>${when(n.at)}</time>
      ${(n.by===me.id || state.roomId===me.id)?`<button class="del" data-id="${esc(n._id)}">지우기</button>`:''}
      <p>${esc(n.msg)}</p>
    </div>`).join('');
  box.querySelectorAll('.del').forEach(b=> b.onclick = async ()=>{
    const noteId = b.dataset.id;
    try{
      await deleteGuestbookNote(state.roomId, noteId);
      state.gb = state.gb.filter(n=>n._id!==noteId);
      renderNotes();
      $('.gb h3 em').textContent = state.gb.length+'개';
    }catch(e){ toast('안 지워졌어요. 다시 해 볼래요?'); }
  });
}
async function postNote(){
  const ta = $('#msg'), msg = ta.value.trim();
  if(!msg) return ta.focus();
  $('#post').disabled = true;
  const note = {name:me.nickname, by:me.id, msg, at:Date.now()};
  try{
    const id = await addGuestbookNote(state.roomId, note);
    state.gb.unshift({ ...note, _id:id });
    state.gb = state.gb.slice(0,100);
    ta.value=''; $('#len').textContent='0 / 200';
    $('.gb h3 em').textContent = state.gb.length+'개';
    renderNotes(); toast('방명록을 남겼어요.');
  }catch(e){
    console.error(e);
    toast('안 남겨졌어요. 다시 눌러 주세요.');
  }
  $('#post').disabled = false;
}
window.addEventListener('keydown', e=>{
  if(e.key==='Escape' && state.sel!==null){ state.sel=null; drawItems(); renderEditor(); }
});
</script>
</body>
